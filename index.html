<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Draw!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <div id="header">
      <h1 class="luckiest-guy-regular">Draw!</h1>
    </div>
    <div id="box-color">
      <div id="container"></div>
      <div id="colors">
        <img id="eraser" src="./img/eraser.png" alt="eraser icon" title="Erase">
        <img id="trash-can" src="./img/trash-can.png" alt="trash can icon" title="Clear">
        <button class="color-button" id="blue" title="Blue"></button>
        <button class="color-button" id="red" title="Red"></button>
        <button class="color-button" id="yellow" title="Yellow"></button>
        <button class="color-button" id="orange" title="Orange"></button>
        <button class="color-button" id="purple" title="Purple"></button>
        <button class="color-button" id="pink" title="Pink"></button>
        <button class="color-button" id="hex" title="Custom color"></button>
      </div>
    </div>
  </body>
</html>
